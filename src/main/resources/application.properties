# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
# Using default credentials for the in-memory dev DB.
# In production, replace H2 with a proper RDBMS and secure credentials.
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (dev only – disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be at least 32 characters for HS256.
# In production, override this via environment variable:
#   SPRING_APPLICATION_JSON='{"app.jwt.secret":"<strong-random-secret>"}'
# or set APP_JWT_SECRET as an environment variable.
app.jwt.secret=ISO27001-StudentMgmt-SecretKey-2024
app.jwt.expiration-ms=3600000
app.auth.max-failed-attempts=5
app.auth.lockout-minutes=15
app.auth.step-up-ttl-seconds=300

# ── Logging (ISO 27002 – Logging and Monitoring) ─────────────────────────────
logging.config=classpath:logback-spring.xml
app.log.analysis.file-path=logs/application.log

# Optional: forward audit events to external SIEM endpoint (HTTP)
app.log.siem.enabled=false
app.log.siem.endpoint=
app.log.siem.api-key=
app.log.siem.hmac-secret=

# Time synchronization (NTP) startup check
app.time-sync.check-enabled=true

# ── reCAPTCHA (Google) ──────────────────────────────────────────────────────
# Demo/testing key pair provided by Google (replace in production):
# https://developers.google.com/recaptcha/docs/faq
app.recaptcha.enabled=true
app.recaptcha.verify-url=https://www.google.com/recaptcha/api/siteverify
app.recaptcha.secret=6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
